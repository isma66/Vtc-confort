<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="VTC Confort">
    <title>VTC Confort</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Boutons */
        .tabs {
            display: flex;
            background: #111;
            padding: 10px;
            gap: 10px;
            border-bottom: 1px solid #222;
        }

        .tab {
            flex: 1;
            padding: 14px;
            background: #222;
            border: none;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
        }

        .tab.active {
            background: #1DB954;
            color: #000;
        }

        /* Contenu */
        .content {
            flex: 1;
            overflow: hidden;
        }

        .page {
            display: none;
            height: 100%;
            width: 100%;
        }

        .page.active {
            display: block;
        }

        /* Spotify iframe */
        .spotify-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Menu */
        .menu-page {
            background: #121212;
            padding: 20px;
            overflow-y: auto;
            height: 100%;
        }

        .menu-section {
            margin-bottom: 30px;
        }

        .menu-section h2 {
            color: #ffd966;
            margin-bottom: 15px;
            font-size: 22px;
            border-left: 4px solid #ffd966;
            padding-left: 12px;
        }

        .menu-item {
            background: #1e1e1e;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-item h3 {
            font-size: 17px;
            margin-bottom: 5px;
        }

        .menu-item p {
            font-size: 13px;
            color: #aaa;
        }

        .price {
            font-size: 18px;
            font-weight: bold;
            color: #ffd966;
        }

        .qr-box {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin-top: 20px;
        }

        .qr-box p {
            color: #000;
            margin-bottom: 15px;
            font-weight: bold;
        }

        #qrcode {
            display: flex;
            justify-content: center;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs2-fix/dist/qrcode.min.js"></script>
</head>
<body>

<div class="tabs">
    <button class="tab active" onclick="showPage('music')">🎵 MUSIQUE</button>
    <button class="tab" onclick="showPage('menu')">🍽️ MENU</button>
</div>

<div class="content">
    <!-- PAGE MUSIQUE - SPOTIFY INTÉGRÉ -->
    <div id="music-page" class="page active">
        <iframe class="spotify-frame" src="https://open.spotify.com/"></iframe>
    </div>

    <!-- PAGE MENU - VOS PRODUITS -->
    <div id="menu-page" class="page">
        <div class="menu-page">
            <!-- BOISSONS -->
            <div class="menu-section">
                <h2>💧 BOISSONS</h2>
                <div class="menu-item">
                    <div><h3>Eau</h3><p>Bouteille 50cl</p></div>
                    <div class="price">2€</div>
                </div>
                <div class="menu-item">
                    <div><h3>Oasis</h3><p>33cl</p></div>
                    <div class="price">3€</div>
                </div>
            </div>

            <!-- CONFORT -->
            <div class="menu-section">
                <h2>⚡ CONFORT & ÉNERGIE</h2>
                <div class="menu-item">
                    <div><h3>Besoin d'énergie</h3><p>Barre céréales</p></div>
                    <div class="price">2€</div>
                </div>
            </div>

            <!-- QR CODE PAIEMENT -->
            <div class="qr-box">
                <p>💳 Paiement rapide & sans contact</p>
                <div id="qrcode"></div>
                <p style="color:#666; font-size:12px; margin-top:10px;">Scannez pour régler</p>
            </div>
        </div>
    </div>
</div>

<script>
    // Changement d'onglet
    function showPage(page) {
        // Cacher toutes les pages
        document.getElementById('music-page').classList.remove('active');
        document.getElementById('menu-page').classList.remove('active');
        
        // Afficher la page choisie
        document.getElementById(page + '-page').classList.add('active');
        
        // Changer le style des boutons
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(tab => tab.classList.remove('active'));
        if (page === 'music') {
            tabs[0].classList.add('active');
        } else {
            tabs[1].classList.add('active');
        }
    }
    
    // QR Code
    function makeQR() {
        var qrcodeDiv = document.getElementById('qrcode');
        if (qrcodeDiv && typeof QRCode !== 'undefined') {
            qrcodeDiv.innerHTML = '';
            new QRCode(qrcodeDiv, {
                text: "https://paypal.me/votrecompte", // À MODIFIER
                width: 150,
                height: 150
            });
        }
    }
    
    window.addEventListener('load', makeQR);
</script>

</body>
</html>
