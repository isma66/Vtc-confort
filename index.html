<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VTC Confort">
    <title>VTC Confort - Spotify & Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .tab-bar {
            display: flex;
            background: #000000;
            border-bottom: 1px solid #282828;
            padding: 8px 16px;
            gap: 16px;
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: #b3b3b3;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #282828;
            color: #1DB954;
        }

        .content {
            flex: 1;
            overflow: hidden;
        }

        .tab-pane {
            display: none;
            height: 100%;
            width: 100%;
        }

        .tab-pane.active-pane {
            display: block;
        }

        /* Spotify iframe - reste DANS l'application */
        .spotify-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Menu */
        .menu-container {
            padding: 20px 16px;
            overflow-y: auto;
            height: 100%;
            background: #121212;
        }

        .menu-section {
            margin-bottom: 28px;
        }

        .menu-section h2 {
            font-size: 20px;
            margin-bottom: 16px;
            color: #ffd966;
            border-left: 4px solid #ffd966;
            padding-left: 12px;
        }

        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .menu-item {
            background: #1e1e1e;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-item-info h3 {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .menu-item-info p {
            font-size: 13px;
            color: #aaa;
        }

        .menu-item-price {
            font-weight: bold;
            font-size: 18px;
            color: #ffd966;
        }

        .qr-container {
            background: white;
            padding: 24px;
            border-radius: 24px;
            text-align: center;
            margin-top: 24px;
            margin-bottom: 20px;
        }

        .qr-container p {
            color: #000;
            margin-bottom: 16px;
            font-weight: 600;
            font-size: 16px;
        }

        .qr-code {
            max-width: 180px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
        }

        .footer-note {
            text-align: center;
            font-size: 11px;
            color: #666;
            padding: 16px;
            border-top: 1px solid #2c2c2c;
            margin-top: 8px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs2-fix/dist/qrcode.min.js"></script>
</head>
<body>
    <div class="tab-bar">
        <button class="tab-btn active" data-tab="music">🎵 SPOTIFY</button>
        <button class="tab-btn" data-tab="menu">🍹 MENU & CONFORT</button>
    </div>

    <div class="content">
        <!-- SPOTIFY - IFRAME INTÉGRÉ (NE QUITTE JAMAIS L'APP) -->
        <div id="music-pane" class="tab-pane active-pane">
            <iframe class="spotify-iframe" 
                    src="https://open.spotify.com/"
                    allow="encrypted-media; clipboard-write; autoplay; fullscreen"
                    allowfullscreen>
            </iframe>
        </div>

        <!-- MENU -->
        <div id="menu-pane" class="tab-pane">
            <div class="menu-container">
                <!-- BOISSONS -->
                <div class="menu-section">
                    <h2>💧 BOISSONS</h2>
                    <div class="menu-grid">
                        <div class="menu-item">
                            <div class="menu-item-info">
                                <h3>Eau</h3>
                                <p>Restez hydraté • Bouteille 50cl</p>
                            </div>
                            <div class="menu-item-price">2€</div>
                        </div>
                        <div class="menu-item">
                            <div class="menu-item-info">
                                <h3>Oasis</h3>
                                <p>Fruité et désaltérant • 33cl</p>
                            </div>
                            <div class="menu-item-price">3€</div>
                        </div>
                    </div>
                </div>

                <!-- CONFORT & ENERGIE -->
                <div class="menu-section">
                    <h2>⚡ CONFORT & ENERGIE</h2>
                    <div class="menu-grid">
                        <div class="menu-item">
                            <div class="menu-item-info">
                                <h3>Besoin d'énergie</h3>
                                <p>Barre céréales</p>
                            </div>
                            <div class="menu-item-price">2€</div>
                        </div>
                    </div>
                </div>

                <!-- QR CODE -->
                <div class="qr-container">
                    <p>💳 Paiement rapide & sans contact</p>
                    <div class="qr-code" id="qr-code"></div>
                    <p style="font-size: 12px; margin-top: 12px; color: #333;">Scannez pour régler</p>
                </div>
                <div class="footer-note">
                    🚗 À votre service
                </div>
            </div>
        </div>
    </div>

    <script>
        // Onglets
        const tabs = document.querySelectorAll('.tab-btn');
        const musicPane = document.getElementById('music-pane');
        const menuPane = document.getElementById('menu-pane');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const targetTab = tab.getAttribute('data-tab');
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                if (targetTab === 'music') {
                    musicPane.classList.add('active-pane');
                    menuPane.classList.remove('active-pane');
                } else {
                    menuPane.classList.add('active-pane');
                    musicPane.classList.remove('active-pane');
                }
            });
        });

        // QR Code
        function generateQRCode() {
            const paymentUrl = "https://www.paypal.me/votrecompte"; // À MODIFIER
            const qrContainer = document.getElementById('qr-code');
            if (qrContainer && typeof QRCode !== 'undefined') {
                qrContainer.innerHTML = '';
                new QRCode(qrContainer, {
                    text: paymentUrl,
                    width: 160,
                    height: 160,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.M
                });
            }
        }
        
        window.addEventListener('load', generateQRCode);
    </script>
</body>
</html>
